<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Telco Churn{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="topbar">
        <div class="logo">
            Telco Churn Predictor
        </div>

        <nav class="nav">
            <a href="{{ url_for('index') }}">Početna</a>
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('korisnici') }}">Rizični korisnici</a>
            <a href="{{ url_for('o_projektu') }}">O projektu</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>Web-data projekat | Predikcija churn-a korisnika</p>
    </footer>

</body>
</html>
